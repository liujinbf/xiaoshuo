<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 170" width="120" height="170">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&amp;family=Zhi+Mang+Xing&amp;display=swap');
      .cal-text {
        font-family: 'Ma Shan Zheng', 'Zhi Mang Xing', cursive, sans-serif, serif;
        fill: #3e382d;
        font-size: 16px;
        text-anchor: middle;
      }
      .bamboo {
        fill: #787060;
        opacity: 0.28;
      }
      .stamp-box {
        fill: none;
        stroke: #b33925;
        stroke-width: 1.2;
      }
      .stamp-text {
        font-family: 'Ma Shan Zheng', cursive, sans-serif, serif;
        fill: #b33925;
        font-size: 8px;
        font-weight: bold;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- 优雅的竹子矢量剪影 -->
  <!-- 主干 -->
  <path class="bamboo" d="M32 145 C31 125, 29 95, 31 65 C32 50, 34 35, 32 15 C31 15, 30 15, 30 15 C32 35, 30 50, 29 65 C27 95, 29 125, 30 145 Z" />
  <!-- 竹节线 -->
  <path class="bamboo" d="M30 110 C31 110, 32 110, 33 111 C32 111, 30 111, 29 110" />
  <path class="bamboo" d="M29 77 C30 77, 31 77, 32 78 C31 78, 29 78, 28 77" />
  <path class="bamboo" d="M30 46 C31 46, 32 46, 33 47 C32 47, 30 47, 29 46" />
  
  <!-- 分支与竹叶 -->
  <!-- 左下枝叶 -->
  <path class="bamboo" d="M29 77 C23 75, 16 80, 12 87 C14 85, 18 83, 28 79 Z" />
  <path class="bamboo" d="M12 87 C10 90, 7 95, 5 101 C7 96, 10 92, 12 87 Z" />
  <path class="bamboo" d="M12 87 C8 86, 4 87, 0 89 C4 87, 9 86, 12 87 Z" />
  
  <!-- 右中枝叶 -->
  <path class="bamboo" d="M31 65 C36 60, 42 57, 48 55 C44 57, 38 61, 31 67 Z" />
  <path class="bamboo" d="M48 55 C52 53, 56 50, 59 46 C55 50, 51 54, 48 55 Z" />
  <path class="bamboo" d="M48 55 C49 58, 50 61, 50 65 C49 61, 48 58, 48 55 Z" />
  
  <!-- 顶端枝叶 -->
  <path class="bamboo" d="M32 35 C27 30, 20 27, 14 25 C19 27, 25 31, 31 37 Z" />
  <path class="bamboo" d="M32 35 C36 29, 40 23, 43 17 C39 23, 35 29, 32 35 Z" />

  <!-- 竖排书法文字（右侧：笔墨当随心，左侧：故事自生长。） -->
  <g transform="translate(86, 15)">
    <text class="cal-text" y="0">笔</text>
    <text class="cal-text" y="22">墨</text>
    <text class="cal-text" y="44">当</text>
    <text class="cal-text" y="66">随</text>
    <text class="cal-text" y="88">心</text>
  </g>
  
  <g transform="translate(60, 39)">
    <text class="cal-text" y="0">故</text>
    <text class="cal-text" y="22">事</text>
    <text class="cal-text" y="44">自</text>
    <text class="cal-text" y="66">生</text>
    <text class="cal-text" y="88">长</text>
    <text class="cal-text" y="106">。</text>
  </g>

  <!-- 红色方印 -->
  <g transform="translate(60, 158)">
    <rect class="stamp-box" x="-6" y="-7" width="12" height="12" rx="0.5" />
    <text class="stamp-text" x="0" y="2">随</text>
  </g>
</svg>
