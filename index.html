<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>盐选短篇故事工作台</title>
  <link rel="stylesheet" href="css/font-system.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/billing-pro.css">
  <link rel="stylesheet" href="css/serial.css">
  <link rel="stylesheet" href="css/desktop-ui-shell.css">
  <link rel="stylesheet" href="css/desktop-ui-panels.css">
  <link rel="stylesheet" href="css/desktop-ui-editor.css">
  <link rel="stylesheet" href="css/desktop-ui-cards.css">
  <link rel="stylesheet" href="css/desktop-ui-widgets.css">
  <link rel="stylesheet" href="css/desktop-restoration.css">
  <link rel="stylesheet" href="css/model-config-panel.css">
  <link rel="stylesheet" href="css/learn-panel.css">
</head>
<body class="layout-short">
  <!-- 1. 窗口标题栏 -->
  <div class="desktop-titlebar">
    <div class="desktop-titlebar-brand">
      <span class="desktop-app-icon">盐</span>
      <span>盐选短篇故事工作台</span>
    </div>
    <div class="desktop-window-dots"><span>−</span><span>□</span><span>×</span></div>
  </div>

  <!-- 2. 工具栏 -->
  <header class="desktop-toolbar">
    <div class="desktop-project-select"><span id="desktopProjectName">项目：未命名故事</span><span>⌄</span></div>
    <span class="desktop-save-state">○ 已保存　<span id="editorAutoSave">--:--:--</span></span>
    <div class="desktop-toolbar-actions">
      <button id="saveProjectBtn" class="desktop-tool-button" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        保存
      </button>
      <button id="exportBtn" class="desktop-tool-button" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        导出 TXT
      </button>
      <button id="aiDraftBtn" class="desktop-tool-button desktop-generate" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));"><path d="M15 4V2"></path><path d="M15 16v-2"></path><path d="M8 9h2"></path><path d="M20 9h-2"></path><path d="M17.8 11.8L19 13"></path><path d="M15 9h0.01"></path><path d="M17.8 6.2L19 5"></path><path d="M12.2 6.2L11 5"></path><path d="M12.2 11.8L11 13"></path><path d="M10 20l-4-4 10-10 4 4z"></path></svg>
        生成正文 <span class="btn-arrow" style="margin-left: 6px; opacity: 0.8;">⌄</span>
      </button>
    </div>
    <div class="desktop-undo-group">
      <button class="desktop-icon-btn" type="button" title="撤销">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
      </button>
      <button class="desktop-icon-btn muted" type="button" title="重做">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
      </button>
    </div>
    <span id="apiStatus" class="api-status">检测 AI 服务中</span>
    <button class="desktop-database-button" type="button" style="gap: 8px; display: inline-flex; align-items: center; padding: 0 12px; text-align: left;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path></svg>
      <div style="line-height: 1.2;">本地数据库<br><small style="font-size: 9px; opacity: 0.6; display: block; line-height: 1; font-weight: normal; margin-top: 1px;">SQLite</small></div>
    </button>
    <button id="settingsBtn" class="desktop-settings-button" type="button" title="设置大模型" style="display: grid; place-items: center; padding: 0;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

  <!-- 3. 主一体化四栏骨架 -->

    <!-- 第一栏：极简左侧 Rail 导航轨 -->

      <button class="desktop-rail-item active" data-click-target="#tabShort" data-view-mode="edit" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <strong>工作台</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabShort" data-view-mode="plan" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
        <strong>短篇方案</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabSerial" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
        <strong>连载铸造</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabTask" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></span>
        <strong>任务设定</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabWorld" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
        <strong>世界设定</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabShort" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></span>
        <strong>记忆卡片</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabShort" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
        <strong>一致检查</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabLearn" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
        <strong>爆款拆解</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#tabLearn" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg></span>
        <strong>本地数据库</strong>
      </button>
      <div class="rail-sep"></div>
      <button class="desktop-rail-item" data-click-target="#tabShort" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <strong>今日配额</strong>
      </button>
      <button class="desktop-rail-item" data-click-target="#settingsBtn" type="button">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <strong>设置</strong>
      </button>
      <button class="desktop-rail-item" id="railAdminBtn" data-click-target="#tabAdmin" type="button" style="display:none;">
        <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
        <strong>系统后台</strong>
      </button>
      <div class="desktop-rail-quote">
        <span class="quote-bamboo"></span>
        <p>笔墨当随心，<br>故事自生长。</p>
        <strong>盐</strong>
      </div>
    </nav>

    <!-- 第二栏：控制侧栏 (Slot) -->
    <aside class="control-panel">
      <div id="userInfoBar">
        <span id="userInfoName">本地模式</span>
        <div>
          <a id="adminLink" href="/admin.html" style="display:none">后台</a>
          <button id="logoutBtn" type="button" class="ghost-sm">登录</button>
        </div>
      </div>
      <div id="controlShortContainer"></div>
      <div id="controlSerialContainer" hidden></div>
      <div id="controlLearnContainer" hidden></div>
    </aside>

    <!-- 第三栏：中间核心创作/分析工作区 (Slot) -->
    <section class="workspace">
      <div class="workspace-tabs">
        <button id="tabShort" class="tab-btn active" type="button">正文编辑 ×</button>
        <button id="tabSerial" class="tab-btn" type="button">连载铸造</button>
        <button id="tabTask" class="tab-btn" type="button">任务设定</button>
        <button id="tabWorld" class="tab-btn" type="button">世界设定</button>
        <button id="tabLearn" class="tab-btn" type="button">爆款拆解</button>
        <button id="tabAdmin" class="tab-btn" type="button" style="display:none;">系统后台</button>
        <button class="workspace-tabs-more" type="button" title="更多视图">···</button>
      </div>
      <div id="panelShort" class="workspace-panel"></div>
      <div id="panelSerial" class="workspace-panel" hidden></div>
      <div id="panelTask" class="workspace-panel" hidden></div>
      <div id="panelWorld" class="workspace-panel" hidden></div>
      <div id="panelLearn" class="workspace-panel" hidden></div>
      <div id="panelAdmin" class="workspace-panel" hidden></div>
    </section>

    <!-- 第四栏：右四常驻状态配置栏 (Slot) -->
    <aside class="desktop-inspector" id="inspectorContainer"></aside>
  </main>

  <!-- 4. 各种全局模态弹窗与阅读器 (Slot) -->
  <div id="modalsContainer"></div>

  <!-- 5. 异步并行模板装配与 addEventListener 代理引导脚本 -->
  <script>
    (async function() {
      // A. DOMReady 代理，保证后续动态加载的脚本的 DOMContentLoaded 回调能 100% 触发
      const eventQueue = [];
      const windowEventQueue = [];
      
      const originalAddEventListener = document.addEventListener;
      document.addEventListener = function(type, listener, options) {
        if (type === 'DOMContentLoaded') {
          eventQueue.push(listener);
        } else {
          originalAddEventListener.call(this, type, listener, options);
        }
      };

      const originalWindowAddEventListener = window.addEventListener;
      window.addEventListener = function(type, listener, options) {
        if (type === 'DOMContentLoaded' || type === 'load') {
          windowEventQueue.push(listener);
        } else {
          originalWindowAddEventListener.call(this, type, listener, options);
        }
      };

      // B. 异步并行加载所有 HTML 片段并注入容器
      const templates = [
        { id: 'controlShortContainer', url: 'templates/control-short.html' },
        { id: 'controlSerialContainer', url: 'templates/control-serial.html' },
        { id: 'controlLearnContainer', url: 'templates/control-learn.html' },
        { id: 'panelShort', url: 'templates/workspace-short.html' },
        { id: 'panelSerial', url: 'templates/workspace-serial.html' },
        { id: 'panelTask', url: 'templates/workspace-task.html' },
        { id: 'panelWorld', url: 'templates/workspace-world.html' },
        { id: 'panelLearn', url: 'templates/workspace-learn.html' },
        { id: 'panelAdmin', url: 'templates/workspace-admin.html' },
        { id: 'inspectorContainer', url: 'templates/inspector.html' },
        { id: 'modalsContainer', url: 'templates/modals.html' }
      ];

      await Promise.all(templates.map(async (tpl) => {
        try {
          const res = await fetch(tpl.url);
          if (res.ok) {
            const html = await res.text();
            document.getElementById(tpl.id).innerHTML = html;
          }
        } catch (e) {
          console.error('Failed to load template:', tpl.url, e);
        }
      }));

      // C. 串行动态按序挂载原有业务 JS
      const scripts = [
        "js/auth.js",
        "js/data.js",
        "js/constants.js",
        "js/model-config.js",
        "js/utils.js",
        "js/planner-titles.js",
        "js/planner-format.js",
        "js/planner-submission.js",
        "js/planner.js?v=20260520-planner-draft-fix",
        "js/planner-render.js",
        "js/planner-history-strategy.js",
        "js/ai.js",
        "js/billing.js",
        "js/projects.js",
        "js/serial-render.js",
        "js/serial.js",
        "js/learning.js",
        "js/desktop-ui.js",
        "js/task-world.js",
        "js/admin-panel.js",
        "app.js?v=20260521-modular-rebuild"
      ];

      for (const src of scripts) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      // D. DOM 装载和脚本加载全部就绪，还原监听函数并手动按序触发先前排队的 DOMContentLoaded 回调
      document.addEventListener = originalAddEventListener;
      window.addEventListener = originalWindowAddEventListener;
      
      eventQueue.forEach(fn => { try { fn(); } catch(e) { console.error(e); } });
      windowEventQueue.forEach(fn => { try { fn({ type: 'DOMContentLoaded' }); } catch(e) { console.error(e); } });

      // E. 初始化默认 Tab 视图
      if (typeof window.switchWorkspaceTab === 'function') {
        window.switchWorkspaceTab('short');
      } else {
        const grid = document.querySelector('.result-grid');
        if (grid) grid.classList.add('show-plan');
      }
    })();
  </script>
</body>
</html>
