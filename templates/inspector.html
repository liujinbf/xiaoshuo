<section class="model-panel desktop-model-enhanced">
  <div class="model-heading">
    <h2>模型配置</h2>
    <span id="modelConfigStatus" class="mc-status-badge">未配置</span>
  </div>

  <!-- 供应商选择 -->
  <div class="mc-field">
    <label class="mc-label">供应商 (Provider)</label>
    <select id="modelProvider" class="mc-select">
      <option value="deepseek" selected>DeepSeek (深度求索)</option>
      <option value="siliconflow">SiliconFlow (硅基流动)</option>
      <option value="openai">OpenAI (ChatGPT)</option>
      <option value="openrouter">OpenRouter (聚合平台)</option>
      <option value="gemini">Google Gemini</option>
      <option value="anthropic">Anthropic (Claude)</option>
      <option value="ollama">Ollama (本地离线运行)</option>
      <option value="custom">── 完全自定义 ──</option>
    </select>
  </div>

  <!-- 模型选择 -->
  <div class="mc-field">
    <div class="mc-label-row">
      <label class="mc-label">模型</label>
      <button id="fetchRemoteModelsBtn" type="button" class="mc-sync-btn" title="联网获取最新模型列表">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        刷新列表
      </button>
    </div>
    <select id="modelName" class="mc-select"><!-- 动态载入 --></select>
    <input id="customModelName" type="text" class="mc-input" placeholder="输入自定义模型名称" style="display:none;margin-top:6px;">
  </div>

  <!-- API Key -->
  <div class="mc-field">
    <label class="mc-label">API Key</label>
    <div class="mc-key-wrap">
      <input id="modelApiKey" type="password" class="mc-input mc-key-input" placeholder="sk-...">
      <button type="button" class="mc-eye-btn" onclick="const i=document.getElementById('modelApiKey');i.type=i.type==='password'?'text':'password'" title="显示/隐藏">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- 高级：Base URL（默认折叠但可展开） -->
  <div class="mc-field">
    <label class="mc-label">Base URL</label>
    <input id="modelBaseUrl" type="text" class="mc-input" placeholder="https://api.openai.com">
  </div>

  <!-- 参数调节 -->
  <div class="mc-divider"></div>
  <div class="desktop-model-tuning">
    <label>温度 <output>0.75</output><input type="range" min="0" max="1" step="0.01" value="0.75"></label>
    <label>最大输出长度 <output>1024</output><input type="range" min="256" max="4096" step="128" value="1024"></label>
    <label>重复惩罚 <output>1.10</output><input type="range" min="0.8" max="1.5" step="0.01" value="1.1"></label>
  </div>

  <!-- 操作按钮区 -->
  <div class="mc-actions">
    <button id="saveModelConfigBtn" type="button" class="mc-btn-save">保存配置</button>
    <button id="testModelConnectionBtn" type="button" class="mc-btn-test">测试连接</button>
  </div>
  <button id="clearModelConfigBtn" type="button" class="mc-btn-clear">清空配置</button>
</section>

<section class="billing-panel">
  <div class="billing-heading"><h2>今日配额 <span id="planBadge" class="plan-badge">Free</span></h2></div>
  <div class="quota-body">
    <div class="quota-ring-wrap">
      <svg width="96" height="96" viewBox="0 0 120 120"><circle cx="60" cy="60" r="44" fill="none" stroke="rgba(74,67,55,0.18)" stroke-width="10"/><circle id="quotaArc" cx="60" cy="60" r="44" fill="none" stroke="#176b54" stroke-width="10" stroke-dasharray="276" stroke-dashoffset="276" stroke-linecap="round" transform="rotate(-90 60 60)"/></svg>
      <strong id="quotaPct">0%</strong>
    </div>
    <div class="quota-data">
      <div class="status-row"><span>总额度</span><span id="quotaTotal">--</span></div>
      <div class="status-row"><span>已使用</span><span id="quotaUsed">--</span></div>
      <div class="status-row"><span>剩余额度</span><span id="quotaRemain">--</span></div>
      <div class="status-row"><span>重置时间</span><span id="quotaReset">--</span></div>
    </div>
  </div>
  <div id="quotaList"></div>
  <div id="billingNotice" class="billing-notice"></div>
  <div class="billing-actions-group" style="display: flex; gap: 8px; margin-top: 14px; width: 100%;">
    <button id="quotaUpgradeBtn" class="premium-upgrade-action" type="button" title="升级为 Pro 会员，解锁无限创作限额">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="stroke: #8a6525; fill: rgba(181, 138, 67, 0.25); flex-shrink: 0;"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"></path><path d="M3 20h18"></path></svg>
      <span>升级 Pro 会员</span>
    </button>
    <button id="trialBtn" class="ghost-action" type="button" style="margin-top: 0; flex: 1; min-height: 36px; padding: 0 12px; font-size: 11px;">开启试用</button>
  </div>
</section>

<section class="desktop-generation-card">
  <h3>生成状态</h3>
  <div class="status-row"><span>状态</span><strong id="genStatusVal">空闲</strong></div>
  <div class="status-row"><span>上次生成</span><span id="genStartTime">--</span></div>
  <div class="status-row"><span>生成字数</span><span id="genWordCount">0 字</span></div>
  <div class="status-row"><span>知识库</span><span id="genKnowledgeUsed">--</span></div>
  <div class="status-row"><span>耗时</span><span id="genElapsed">--</span></div>
  <button id="clearGenStatusBtn" class="ghost-action" type="button">清空记录</button>
</section>

<section class="desktop-inspector-card desktop-consistency-card">
  <h3>一致性检查</h3>
  <div id="consistencyList" class="consistency-list"></div>
  <div id="aiAuditReportContainer"></div>
  <button id="applyAiAuditBtn" class="primary-action" type="button" style="display: none; width: 100%; margin-top: 12px; background: linear-gradient(135deg, #a855f7, #ec4899); border: none; color: #fff; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); border-radius: 4px; font-weight: bold; min-height: 36px;" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='none';">✨ 一键应用 AI 审计优化</button>
  <div class="consistency-actions-group" style="display: flex; gap: 8px; margin-top: 12px; width: 100%;">
    <button id="checkConsistencyBtn" class="inspector-run-check-btn" type="button" style="flex: 1; margin-top: 0; min-height: 30px; font-size: 11px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      基础检测
    </button>
    <button id="aiAuditConsistencyBtn" class="ai-audit-run-btn" type="button" title="消耗 AI 额度，进行小说一致性深度智能语义审计" style="flex: 1.2;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
      <span>AI 深度审计</span>
    </button>
  </div>
</section>

<section class="desktop-inspector-card desktop-subject-knowledge-card">
  <h3>关联学科常识</h3>
  <div id="subjectKnowledgeList" class="consistency-list" style="max-height: 200px; overflow-y: auto;">
    <div class="empty-placeholder" style="color:var(--text-muted);font-size:12px;padding:10px;text-align:center;">暂无匹配常识约束</div>
  </div>
  <div style="display: flex; gap: 4px; padding: 8px; border-top: 1px solid var(--border); margin-top: 8px;">
    <input id="quickExpandInput" type="text" placeholder="快捷扩充常识实体" style="flex: 1; font-size: 11px; padding: 4px 6px; border-radius: 3px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-color);">
    <button id="quickExpandBtn" type="button" style="font-size: 11px; padding: 4px 8px; border-radius: 3px; border: none; background: var(--accent); color: white; cursor: pointer; transition: background 0.2s;">扩充</button>
  </div>
</section>

<section class="sync-panel">
  <div class="sync-heading"><h2>同步</h2></div>
  <p id="userIdText" class="sync-user"></p>
  <p id="syncStatus" class="sync-status">本地模式</p>
  <div class="sync-actions"><button id="syncNowBtn" type="button">同步</button><button id="pullSyncBtn" type="button">拉取</button></div>
</section>
